<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Liga Tenis</title>

<style>
body { font-family:Arial; background:#f5f5f5; padding:10px }

.card {
  background:white;
  margin:8px 0;
  padding:10px;
  border-radius:8px;
}

.played { border-left:5px solid green }
.pending { border-left:5px solid orange }
.postponed { border-left:5px solid red }

.table-container { overflow-x:auto }

table {
  width:100%;
  border-collapse:collapse;
}

th,td {
  padding:6px;
  border-bottom:1px solid #ddd;
  text-align:center;
}
</style>
</head>

<body>

<h1>🏆 Liga</h1>

<select id="cat" onchange="render()"></select>

<div id="matches"></div>

<div class="table-container">
<table id="table"></table>
</div>

<script>

const API = "https://liga-campeador-api.ligasdetenis.workers.dev";
const ID = "liga-no-federada-campeador";

let DATA;

// LOAD
async function load(){
  const res = await fetch(API+"/get?id="+ID);
  const json = await res.json();
  DATA = json.data;

  const sel = document.getElementById("cat");
  sel.innerHTML = "";

  Object.values(DATA.categories).forEach(c=>{
    sel.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });

  render();
}

// RENDER
function render(){
  const cat = DATA.categories[document.getElementById("cat").value];

  renderMatches(cat);
  renderTable(cat);
}

// MATCHES
function renderMatches(cat){
  let html="";

  Object.values(cat.matches).forEach(m=>{
    const pA = cat.players[m.playerAId]?.name;
    const pB = cat.players[m.playerBId]?.name;

    let status="pending";
    if(m.result) status="played";
    if(m.postponed) status="postponed";

    html+=`
    <div class="card ${status}">
      ${pA} vs ${pB}<br>
      ${m.schedule?.date || ""} ${m.schedule?.time || ""}<br>
      ${m.result ? `${m.result.s1a}-${m.result.s1b} ${m.result.s2a}-${m.result.s2b}` : ""}
    </div>`;
  });

  document.getElementById("matches").innerHTML=html;
}

// TABLE
function renderTable(cat){

  let stats={};

  Object.values(cat.players).forEach(p=>{
    stats[p.id]={name:p.name,pts:0};
  });

  Object.values(cat.matches).forEach(m=>{
    if(!m.result) return;

    if(m.result.s1a > m.result.s1b){
      stats[m.playerAId].pts+=3;
    } else {
      stats[m.playerBId].pts+=3;
    }
  });

  let rows = Object.values(stats).sort((a,b)=>b.pts-a.pts);

  let html="<tr><th>Jugador</th><th>Pts</th></tr>";

  rows.forEach(p=>{
    html+=`<tr><td>${p.name}</td><td>${p.pts}</td></tr>`;
  });

  document.getElementById("table").innerHTML=html;
}

load();

</script>

</body>
</html>
