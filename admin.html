<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Liga</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:10px }
h1 { text-align:center }

.card {
  background:white;
  padding:10px;
  margin:10px 0;
  border-radius:8px;
}

input, select, button {
  padding:6px;
  margin:4px;
}

.match {
  border-left:5px solid #ccc;
  padding:8px;
  margin:6px 0;
  background:white;
}

.played { border-color:green }
.pending { border-color:orange }
.postponed { border-color:red }
</style>
</head>

<body>

<h1>⚙️ ADMIN LIGA</h1>

<button onclick="load()">🔄 Cargar</button>

<div class="card">
<h3>➕ Crear categoría</h3>
<input id="catName" placeholder="Nombre">
<button onclick="createCategory()">Crear</button>
</div>

<div id="categories"></div>

<script>

const API = "https://liga-campeador-api.ligasdetenis.workers.dev";
const ID = "liga-no-federada-campeador";
const ADMIN = "1234";

let DATA = null;

// LOAD
async function load(){
  const res = await fetch(API + "/get?id=" + ID);
  const json = await res.json();
  DATA = json.data;
  render();
}

// CREATE CATEGORY
async function createCategory(){
  await fetch(API + "/add_category", {
    method:"POST",
    body:JSON.stringify({
      id:ID,
      adminKey:ADMIN,
      categoryId:"cat"+Date.now(),
      name:document.getElementById("catName").value
    })
  });
  load();
}

// RENDER
function render(){
  let html = "";

  Object.values(DATA.categories).forEach(cat => {

    html += `<div class="card">
      <h2>${cat.name}</h2>

      <button onclick="addPlayer('${cat.id}')">➕ Jugador</button>
      <button onclick="addRound('${cat.id}')">➕ Jornada</button>

      <h4>Jugadores</h4>
      ${Object.values(cat.players).map(p =>
        `${p.name} <button onclick="deletePlayer('${cat.id}','${p.id}')">❌</button><br>`
      ).join("")}

      <h4>Partidos</h4>
      ${Object.values(cat.matches).map(m => renderMatch(cat,m)).join("")}

    </div>`;
  });

  document.getElementById("categories").innerHTML = html;
}

// MATCH
function renderMatch(cat,m){

  const pA = cat.players[m.playerAId]?.name || "";
  const pB = cat.players[m.playerBId]?.name || "";

  let status = "pending";
  if(m.result) status="played";
  if(m.postponed || m.noPlayed) status="postponed";

  return `
  <div class="match ${status}">
    ${pA} vs ${pB}<br>

    📅 ${m.schedule?.date || "-"}  
    ⏰ ${m.schedule?.time || "-"}  
    📍 ${m.schedule?.venue || "-"}  
    🎾 ${m.schedule?.court || "-"}

    <br>

    <button onclick="programMatch('${cat.id}','${m.id}')">Programar</button>
    <button onclick="setResult('${cat.id}','${m.id}')">Resultado</button>
    <button onclick="flag('${cat.id}','${m.id}')">⚠️</button>
  </div>`;
}

// PLAYER
async function addPlayer(catId){
  const name = prompt("Nombre jugador");
  await fetch(API + "/add_player",{
    method:"POST",
    body:JSON.stringify({id:ID,categoryId:catId,name})
  });
  load();
}

async function deletePlayer(catId,pId){
  await fetch(API + "/delete_player",{
    method:"POST",
    body:JSON.stringify({id:ID,categoryId:catId,playerId:pId,adminKey:ADMIN})
  });
  load();
}

// ROUND
async function addRound(catId){
  const name = prompt("Nombre jornada");
  await fetch(API + "/add_round",{
    method:"POST",
    body:JSON.stringify({id:ID,categoryId:catId,name,adminKey:ADMIN})
  });
  load();
}

// MATCH ACTIONS
async function programMatch(catId,matchId){
  const date = prompt("Fecha YYYY-MM-DD");
  const time = prompt("Hora HH:MM");

  await fetch(API + "/save_schedule",{
    method:"POST",
    body:JSON.stringify({
      id:ID,
      categoryId:catId,
      matchId,
      schedule:{date,time,venue:"Club",court:"A"}
    })
  });
  load();
}

async function setResult(catId,matchId){
  const s1a = +prompt("Set1 A");
  const s1b = +prompt("Set1 B");
  const s2a = +prompt("Set2 A");
  const s2b = +prompt("Set2 B");

  await fetch(API + "/save_result",{
    method:"POST",
    body:JSON.stringify({
      id:ID,
      categoryId:catId,
      matchId,
      result:{s1a,s1b,s2a,s2b}
    })
  });
  load();
}

async function flag(catId,matchId){
  await fetch(API + "/set_match_flags",{
    method:"POST",
    body:JSON.stringify({
      id:ID,
      categoryId:catId,
      matchId,
      postponed:true,
      adminKey:ADMIN
    })
  });
  load();
}

</script>

</body>
</html>
