<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin v2 · Liga no federada Campeador</title>
  <style>
    :root{--bg:#070A13;--card:#121C3A;--line:rgba(255,255,255,.10);--muted:#9bb0da;--text:#eef2ff;--ok:#35d07f;--danger:#ff6b6b;--shadow:0 12px 30px rgba(0,0,0,.35);--r:16px}
    *{box-sizing:border-box} body{margin:0;color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;background:linear-gradient(180deg,#070A13,#050711)}
    header{position:sticky;top:0;z-index:10;background:rgba(7,10,19,.92);backdrop-filter: blur(10px);border-bottom:1px solid var(--line)}
    .wrap{max-width:1280px;margin:0 auto;padding:14px}.top{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    h1{margin:0;font-size:18px}.sub{font-size:12px;color:var(--muted);margin-top:6px} main{max-width:1280px;margin:0 auto;padding:14px;display:grid;gap:14px}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}@media (max-width:980px){.grid,.grid3{grid-template-columns:1fr}}
    .card{background:rgba(18,28,58,.86);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden}.card h2{margin:0;padding:12px 14px;font-size:14px;border-bottom:1px solid var(--line)}
    .pad{padding:14px} label{display:block;font-size:12px;color:var(--muted);margin:6px 0}
    input,select,textarea{width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(255,255,255,.06);color:var(--text);outline:none}
    textarea{min-height:92px;resize:vertical}.btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px}
    button{cursor:pointer;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.16);background:rgba(124,92,255,.22);color:var(--text);font-weight:900}
    button.secondary{background:transparent} button.warn{background:rgba(255,204,102,.16)} button.danger{background:rgba(255,107,107,.18)}
    .status{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;font-size:12px;border:1px solid rgba(255,255,255,.14);color:var(--muted);margin-top:10px}
    .ok{color:var(--ok);border-color:rgba(53,208,127,.35);background:rgba(53,208,127,.08)} .bad{color:var(--danger);border-color:rgba(255,107,107,.35);background:rgba(255,107,107,.08)}
    .muted{color:var(--muted)} .hint{font-size:12px;color:var(--muted);line-height:1.4;margin-top:8px}.list{display:grid;gap:8px}
    .item{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:rgba(255,255,255,.04)} .split{display:grid;grid-template-columns:1fr 1fr;gap:10px}@media (max-width:700px){.split{grid-template-columns:1fr}}
    .pill{display:inline-block;padding:4px 8px;border-radius:999px;border:1px solid var(--line);font-size:12px;color:var(--muted)} .inlineActions{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}.inlineActions button{padding:6px 10px;font-size:12px}
  </style>
</head>
<body>
<header><div class="wrap"><div class="top"><div><h1>⚙️ Admin v2 · Liga no federada Campeador</h1><div class="sub">Editar y eliminar categorías, jugadores, jornadas y partidos.</div></div><div class="pill" id="loadedBadge">Sin cargar</div></div></div></header>
<main>
<section class="card"><h2>1. Configuración</h2><div class="pad grid3"><div><label>URL del Worker</label><input id="workerUrl" value="https://liga-campeador-api.ligasdetenis.workers.dev" /></div><div><label>ID del torneo</label><input id="tournamentId" value="liga-no-federada-campeador" /></div><div><label>Clave admin</label><input id="adminKey" type="password" value="1234" /></div></div><div class="pad" style="padding-top:0"><div class="btns"><button id="createTournamentBtn">Crear torneo</button><button class="secondary" id="loadTournamentBtn">Cargar torneo</button></div><div id="globalStatus"></div></div></section>

<section class="grid">
<section class="card"><h2>2. Categorías</h2><div class="pad"><label>ID de categoría</label><input id="categoryId" placeholder="sub14-m" /><label>Nombre</label><input id="categoryName" placeholder="Infantil Sub-14 Masculino" /><div class="btns"><button id="addCategoryBtn">Añadir categoría</button><button class="secondary" id="updateCategoryBtn">Editar categoría seleccionada</button></div></div><div class="pad" style="padding-top:0"><div id="categoryList" class="list"></div></div></section>

<section class="card"><h2>3. Jugadores</h2><div class="pad"><label>Categoría</label><select id="playerCategory"></select><label>Nombre del jugador</label><input id="playerName" placeholder="Carlos Pérez" /><div class="btns"><button id="addPlayerBtn">Añadir jugador</button><button class="secondary" id="updatePlayerBtn">Editar jugador seleccionado</button></div><label>Pegado masivo (uno por línea)</label><textarea id="bulkPlayers" placeholder="Carlos Pérez&#10;Miguel López"></textarea><div class="btns"><button class="warn" id="bulkPlayersBtn">Cargar lista</button></div></div><div class="pad" style="padding-top:0"><div id="playerList" class="list"></div></div></section>
</section>

<section class="grid">
<section class="card"><h2>4. Jornadas</h2><div class="pad"><label>Categoría</label><select id="roundCategory"></select><label>Nombre de jornada</label><input id="roundName" placeholder="Jornada 1" /><div class="btns"><button id="addRoundBtn">Crear jornada</button><button class="secondary" id="updateRoundBtn">Editar jornada seleccionada</button></div></div><div class="pad" style="padding-top:0"><div id="roundList" class="list"></div></div></section>

<section class="card"><h2>5. Partidos</h2><div class="pad"><label>Categoría</label><select id="matchCategory"></select><label>Jornada</label><select id="matchRound"></select><div class="split"><div><label>Jugador A</label><select id="playerA"></select></div><div><label>Jugador B</label><select id="playerB"></select></div></div><div class="btns"><button id="addMatchBtn">Crear partido</button><button class="secondary" id="updateMatchBtn">Editar partido seleccionado</button></div></div><div class="pad" style="padding-top:0"><div id="matchList" class="list"></div></div></section>
</section>

<section class="card"><h2>6. Gestión rápida de partido</h2><div class="pad"><div class="split"><div><label>Categoría</label><select id="manageCategory"></select></div><div><label>Partido</label><select id="manageMatch"></select></div></div>
<div class="grid" style="margin-top:14px">
<div class="item"><b>Programación</b><label>Fecha</label><input id="schedDate" type="date"><label>Hora</label><input id="schedTime" type="time"><label>Lugar</label><input id="schedVenue" placeholder="Club Campeador"><label>Pista</label><input id="schedCourt" placeholder="Pista 2"><label>Observaciones</label><input id="schedNotes" placeholder="Notas opcionales"><label>Actualizado por</label><input id="schedBy" placeholder="Nombre"><div class="btns"><button id="saveScheduleBtn">Guardar programación</button><button class="danger" id="clearScheduleBtn">Borrar programación</button></div></div>
<div class="item"><b>Resultado</b><div class="split"><div><label>Set 1 A</label><input id="s1a" type="number" min="0" max="7"></div><div><label>Set 1 B</label><input id="s1b" type="number" min="0" max="7"></div></div><div class="split"><div><label>Set 2 A</label><input id="s2a" type="number" min="0" max="7"></div><div><label>Set 2 B</label><input id="s2b" type="number" min="0" max="7"></div></div><div class="split"><div><label>Super TB A</label><input id="tbA" type="number" min="0" max="99"></div><div><label>Super TB B</label><input id="tbB" type="number" min="0" max="99"></div></div><label>Subido por</label><input id="resultBy" placeholder="Nombre"><div class="btns"><button id="saveResultBtn">Guardar resultado</button><button class="danger" id="clearResultBtn">Borrar resultado</button></div></div>
</div>
<div class="item" style="margin-top:14px"><b>Estados especiales</b><div class="btns"><button class="warn" id="markPostponedBtn">Marcar aplazado</button><button class="warn" id="unmarkPostponedBtn">Quitar aplazado</button><button class="danger" id="markNoPlayedBtn">Marcar no jugado</button><button class="secondary" id="unmarkNoPlayedBtn">Quitar no jugado</button><button class="danger" id="deleteMatchBtn">Eliminar partido</button></div></div>
<div id="manageInfo" class="hint"></div></div></section>
</main>

<script>
const state = { tournament:null, selectedCategoryId:"", selectedPlayerId:"", selectedRoundId:"", selectedMatchId:"" };
function $(id){ return document.getElementById(id); }
function workerBase(){ return $("workerUrl").value.trim().replace(/\/+$/,''); }
function tournamentId(){ return $("tournamentId").value.trim(); }
function adminKey(){ return $("adminKey").value.trim(); }
async function api(path, body=null, method="POST"){ const url=workerBase()+path; const opts={method,headers:{}}; if(body){ opts.headers["Content-Type"]="application/json"; opts.body=JSON.stringify(body);} const res=await fetch(url,opts); return await res.json().catch(()=>({success:false,error:"Respuesta inválida"})); }
function setStatus(text, ok=true){ $("globalStatus").innerHTML = text ? '<div class="status '+(ok?'ok':'bad')+'">'+text+'</div>' : ""; }
function playerName(cat, playerId){ return cat?.players?.[playerId]?.name || playerId || ""; }
function currentCategoryObj(selectId){ return state.tournament?.categories?.[$(selectId).value] || null; }
function getMatchStatus(match){ if(match?.result) return "jugado"; if(match?.noPlayed) return "no_jugado"; if(match?.postponed) return "aplazado"; const s=match?.schedule||{}; if(s.date&&s.time&&(s.venue||s.venueId||s.venueText)) return "programado"; return "pendiente"; }
async function createTournament(){ const r=await api("/create",{adminKey:adminKey(),id:tournamentId(),name:"I Liga no federada Club de Tenis Campeador"}); if(!r.success) return setStatus(r.error||"Error al crear torneo",false); setStatus("✅ Torneo creado"); await loadTournament(); }
async function loadTournament(){ const r=await api("/get?id="+encodeURIComponent(tournamentId()),null,"GET"); if(!r.success||!r.data) return setStatus(r.error||"No se pudo cargar el torneo",false); state.tournament=r.data; $("loadedBadge").textContent="Torneo cargado"; renderAll(); setStatus("✅ Torneo cargado"); }
async function addCategory(){ const r=await api("/add_category",{adminKey:adminKey(),id:tournamentId(),categoryId:$("categoryId").value.trim(),name:$("categoryName").value.trim()}); if(!r.success) return setStatus(r.error||"No se pudo añadir categoría",false); $("categoryId").value=""; $("categoryName").value=""; await loadTournament(); }
async function updateCategory(){ if(!state.selectedCategoryId) return setStatus("Selecciona una categoría de la lista",false); const r=await api("/update_category",{adminKey:adminKey(),id:tournamentId(),categoryId:state.selectedCategoryId,name:$("categoryName").value.trim()}); if(!r.success) return setStatus(r.error||"No se pudo editar la categoría",false); await loadTournament(); }
async function deleteCategory(categoryId){ if(!confirm("¿Eliminar esta categoría con todo su contenido?")) return; const r=await api("/delete_category",{adminKey:adminKey(),id:tournamentId(),categoryId}); if(!r.success) return setStatus(r.error||"No se pudo borrar la categoría",false); await loadTournament(); }
async function addPlayer(nameOverride=null){ const r=await api("/add_player",{id:tournamentId(),categoryId:$("playerCategory").value,name:(nameOverride||$("playerName").value).trim()}); if(!r.success) return setStatus(r.error||"No se pudo añadir jugador",false); $("playerName").value=""; await loadTournament(); }
async function bulkPlayers(){ const lines=$("bulkPlayers").value.split("\n").map(x=>x.trim()).filter(Boolean); for(const name of lines){ await addPlayer(name);} $("bulkPlayers").value=""; setStatus("✅ Jugadores cargados"); }
async function updatePlayer(){ if(!state.selectedPlayerId) return setStatus("Selecciona un jugador de la lista",false); const r=await api("/update_player",{adminKey:adminKey(),id:tournamentId(),categoryId:$("playerCategory").value,playerId:state.selectedPlayerId,name:$("playerName").value.trim()}); if(!r.success) return setStatus(r.error||"No se pudo editar el jugador",false); await loadTournament(); }
async function deletePlayer(categoryId,playerId){ if(!confirm("¿Eliminar este jugador?")) return; const r=await api("/delete_player",{adminKey:adminKey(),id:tournamentId(),categoryId,playerId}); if(!r.success) return setStatus(r.error||"No se pudo borrar el jugador",false); await loadTournament(); }
async function addRound(){ const r=await api("/add_round",{adminKey:adminKey(),id:tournamentId(),categoryId:$("roundCategory").value,name:$("roundName").value.trim()}); if(!r.success) return setStatus(r.error||"No se pudo crear la jornada",false); $("roundName").value=""; await loadTournament(); }
async function updateRound(){ if(!state.selectedRoundId) return setStatus("Selecciona una jornada de la lista",false); const r=await api("/update_round",{adminKey:adminKey(),id:tournamentId(),categoryId:$("roundCategory").value,roundId:state.selectedRoundId,name:$("roundName").value.trim()}); if(!r.success) return setStatus(r.error||"No se pudo editar la jornada",false); await loadTournament(); }
async function deleteRound(categoryId,roundId){ if(!confirm("¿Eliminar esta jornada?")) return; const r=await api("/delete_round",{adminKey:adminKey(),id:tournamentId(),categoryId,roundId}); if(!r.success) return setStatus(r.error||"No se pudo borrar la jornada",false); await loadTournament(); }
async function addMatch(){ const a=$("playerA").value,b=$("playerB").value; if(!a||!b||a===b) return setStatus("Revisa Jugador A y B",false); const r=await api("/add_match",{adminKey:adminKey(),id:tournamentId(),categoryId:$("matchCategory").value,roundId:$("matchRound").value,playerAId:a,playerBId:b}); if(!r.success) return setStatus(r.error||"No se pudo crear el partido",false); await loadTournament(); }
async function updateMatch(){ if(!state.selectedMatchId) return setStatus("Selecciona un partido de la lista",false); const a=$("playerA").value,b=$("playerB").value; if(!a||!b||a===b) return setStatus("Revisa Jugador A y B",false); const r=await api("/update_match",{adminKey:adminKey(),id:tournamentId(),categoryId:$("matchCategory").value,matchId:state.selectedMatchId,roundId:$("matchRound").value,playerAId:a,playerBId:b}); if(!r.success) return setStatus(r.error||"No se pudo editar el partido",false); await loadTournament(); }
async function deleteSelectedMatch(){ const categoryId=$("manageCategory").value, matchId=$("manageMatch").value; if(!categoryId||!matchId) return setStatus("Selecciona un partido",false); if(!confirm("¿Eliminar este partido?")) return; const r=await api("/delete_match",{adminKey:adminKey(),id:tournamentId(),categoryId,matchId}); if(!r.success) return setStatus(r.error||"No se pudo borrar el partido",false); await loadTournament(); }
async function saveSchedule(){ const r=await api("/save_schedule",{id:tournamentId(),categoryId:$("manageCategory").value,matchId:$("manageMatch").value,schedule:{date:$("schedDate").value,time:$("schedTime").value,venue:$("schedVenue").value.trim(),court:$("schedCourt").value.trim(),notes:$("schedNotes").value.trim()},by:$("schedBy").value.trim()||"admin"}); if(!r.success) return setStatus(r.error||"No se pudo guardar la programación",false); setStatus("✅ Programación guardada"); await loadTournament(); }
async function clearSchedule(){ const r=await api("/clear_schedule",{adminKey:adminKey(),id:tournamentId(),categoryId:$("manageCategory").value,matchId:$("manageMatch").value}); if(!r.success) return setStatus(r.error||"No se pudo borrar la programación",false); await loadTournament(); }
async function saveResult(){ const r=await api("/save_result",{id:tournamentId(),categoryId:$("manageCategory").value,matchId:$("manageMatch").value,result:{s1a:Number($("s1a").value),s1b:Number($("s1b").value),s2a:Number($("s2a").value),s2b:Number($("s2b").value),tbA:$("tbA").value===""?null:Number($("tbA").value),tbB:$("tbB").value===""?null:Number($("tbB").value)},by:$("resultBy").value.trim()||"admin"}); if(!r.success) return setStatus(r.error||"No se pudo guardar el resultado",false); setStatus("✅ Resultado guardado"); await loadTournament(); }
async function clearResult(){ const r=await api("/clear_result",{adminKey:adminKey(),id:tournamentId(),categoryId:$("manageCategory").value,matchId:$("manageMatch").value}); if(!r.success) return setStatus(r.error||"No se pudo borrar el resultado",false); await loadTournament(); }
async function setFlags(postponed,noPlayed){ const r=await api("/set_match_flags",{adminKey:adminKey(),id:tournamentId(),categoryId:$("manageCategory").value,matchId:$("manageMatch").value,postponed,noPlayed}); if(!r.success) return setStatus(r.error||"No se pudo actualizar el estado",false); await loadTournament(); }
function fillCategorySelects(){ const ids=Object.keys(state.tournament?.categories||{}); ["playerCategory","roundCategory","matchCategory","manageCategory"].forEach(id=>{ const sel=$(id), current=sel.value; sel.innerHTML=ids.length?ids.map(cid=>'<option value="'+cid+'">'+state.tournament.categories[cid].name+'</option>').join(""):'<option value="">Sin categorías</option>'; if(ids.includes(current)) sel.value=current; }); }
function renderCategories(){ const cats=Object.values(state.tournament?.categories||{}); $("categoryList").innerHTML=cats.length?cats.map(c=>'<div class="item"><b>'+c.name+'</b><br><span class="muted">'+c.id+'</span><br><span class="muted">'+Object.keys(c.players||{}).length+' jugadores · '+Object.keys(c.rounds||{}).length+' jornadas · '+Object.keys(c.matches||{}).length+' partidos</span><div class="inlineActions"><button class="secondary" onclick="selectCategory(\''+c.id+'\',\''+c.name.replace(/'/g,"\\'")+'\')">Editar</button><button class="danger" onclick="deleteCategory(\''+c.id+'\')">Eliminar</button></div></div>').join(""):'<div class="muted">No hay categorías todavía.</div>'; }
function selectCategory(categoryId,name){ state.selectedCategoryId=categoryId; $("categoryId").value=categoryId; $("categoryName").value=name; setStatus("Categoría cargada para editar"); }
function renderPlayers(){ const categoryId=$("playerCategory").value; const cat=currentCategoryObj("playerCategory"); $("playerList").innerHTML=cat?(Object.values(cat.players||{}).length?Object.values(cat.players||{}).map(p=>'<div class="item"><b>'+p.name+'</b><br><span class="muted">'+p.id+'</span><div class="inlineActions"><button class="secondary" onclick="selectPlayer(\''+p.id+'\',\''+p.name.replace(/'/g,"\\'")+'\')">Editar</button><button class="danger" onclick="deletePlayer(\''+categoryId+'\',\''+p.id+'\')">Eliminar</button></div></div>').join(""):'<div class="muted">No hay jugadores.</div>'):'<div class="muted">Selecciona una categoría.</div>'; }
function selectPlayer(playerId,name){ state.selectedPlayerId=playerId; $("playerName").value=name; setStatus("Jugador cargado para editar"); }
function renderRounds(){ const categoryId=$("roundCategory").value; const cat=currentCategoryObj("roundCategory"); $("roundList").innerHTML=cat?(Object.values(cat.rounds||{}).length?Object.values(cat.rounds||{}).map(r=>'<div class="item"><b>'+r.name+'</b><br><span class="muted">'+r.id+'</span><div class="inlineActions"><button class="secondary" onclick="selectRound(\''+r.id+'\',\''+r.name.replace(/'/g,"\\'")+'\')">Editar</button><button class="danger" onclick="deleteRound(\''+categoryId+'\',\''+r.id+'\')">Eliminar</button></div></div>').join(""):'<div class="muted">No hay jornadas.</div>'):'<div class="muted">Selecciona una categoría.</div>'; }
function selectRound(roundId,name){ state.selectedRoundId=roundId; $("roundName").value=name; setStatus("Jornada cargada para editar"); }
function fillMatchFormOptions(){ const cat=currentCategoryObj("matchCategory"); if(!cat){ $("matchRound").innerHTML='<option value="">Sin jornadas</option>'; $("playerA").innerHTML='<option value="">Sin jugadores</option>'; $("playerB").innerHTML='<option value="">Sin jugadores</option>'; return; } $("matchRound").innerHTML=Object.values(cat.rounds||{}).length?Object.values(cat.rounds||{}).map(r=>'<option value="'+r.id+'">'+r.name+'</option>').join(""):'<option value="">Sin jornadas</option>'; const opts=Object.values(cat.players||{}).length?Object.values(cat.players||{}).map(p=>'<option value="'+p.id+'">'+p.name+'</option>').join(""):'<option value="">Sin jugadores</option>'; $("playerA").innerHTML=opts; $("playerB").innerHTML=opts; }
function renderMatches(){ const categoryId=$("matchCategory").value; const cat=currentCategoryObj("matchCategory"); $("matchList").innerHTML=cat?(Object.values(cat.matches||{}).length?Object.values(cat.matches||{}).map(m=>'<div class="item"><b>'+playerName(cat,m.playerAId)+' vs '+playerName(cat,m.playerBId)+'</b><br><span class="muted">Jornada: '+(cat.rounds?.[m.roundId]?.name||m.roundId)+'</span><br><span class="muted">Estado: '+getMatchStatus(m)+'</span><div class="inlineActions"><button class="secondary" onclick="selectMatch(\''+m.id+'\',\''+m.roundId+'\',\''+m.playerAId+'\',\''+m.playerBId+'\')">Editar</button><button class="danger" onclick="quickDeleteMatch(\''+categoryId+'\',\''+m.id+'\')">Eliminar</button></div></div>').join(""):'<div class="muted">No hay partidos.</div>'):'<div class="muted">Selecciona una categoría.</div>'; }
function selectMatch(matchId,roundId,playerAId,playerBId){ state.selectedMatchId=matchId; $("matchRound").value=roundId; $("playerA").value=playerAId; $("playerB").value=playerBId; setStatus("Partido cargado para editar"); }
function quickDeleteMatch(categoryId,matchId){ $("manageCategory").value=categoryId; fillManageMatches(); $("manageMatch").value=matchId; deleteSelectedMatch(); }
function fillManageMatches(){ const cat=currentCategoryObj("manageCategory"); if(!cat){ $("manageMatch").innerHTML='<option value="">Sin partidos</option>'; $("manageInfo").innerHTML='<span class="muted">Selecciona un partido.</span>'; return; } const matches=Object.values(cat.matches||{}); $("manageMatch").innerHTML=matches.length?matches.map(m=>'<option value="'+m.id+'">'+playerName(cat,m.playerAId)+' vs '+playerName(cat,m.playerBId)+' · '+getMatchStatus(m)+'</option>').join(""):'<option value="">Sin partidos</option>'; loadSelectedMatchData(); }
function loadSelectedMatchData(){ const cat=currentCategoryObj("manageCategory"), matchId=$("manageMatch").value; if(!cat||!matchId||!cat.matches[matchId]){ $("manageInfo").innerHTML='<span class="muted">Selecciona un partido.</span>'; return; } const m=cat.matches[matchId], s=m.schedule||{}, r=m.result||{}; $("schedDate").value=s.date||""; $("schedTime").value=s.time||""; $("schedVenue").value=s.venue||""; $("schedCourt").value=s.court||""; $("schedNotes").value=s.notes||""; $("s1a").value=r.s1a??""; $("s1b").value=r.s1b??""; $("s2a").value=r.s2a??""; $("s2b").value=r.s2b??""; $("tbA").value=r.tbA??""; $("tbB").value=r.tbB??""; $("manageInfo").innerHTML='<b>'+playerName(cat,m.playerAId)+' vs '+playerName(cat,m.playerBId)+'</b><br><span class="muted">Estado actual:</span> '+getMatchStatus(m); }
function renderAll(){ fillCategorySelects(); renderCategories(); renderPlayers(); renderRounds(); fillMatchFormOptions(); renderMatches(); fillManageMatches(); }
function wire(){ $("createTournamentBtn").onclick=createTournament; $("loadTournamentBtn").onclick=loadTournament; $("addCategoryBtn").onclick=addCategory; $("updateCategoryBtn").onclick=updateCategory; $("addPlayerBtn").onclick=()=>addPlayer(); $("bulkPlayersBtn").onclick=bulkPlayers; $("updatePlayerBtn").onclick=updatePlayer; $("addRoundBtn").onclick=addRound; $("updateRoundBtn").onclick=updateRound; $("addMatchBtn").onclick=addMatch; $("updateMatchBtn").onclick=updateMatch; $("saveScheduleBtn").onclick=saveSchedule; $("clearScheduleBtn").onclick=clearSchedule; $("saveResultBtn").onclick=saveResult; $("clearResultBtn").onclick=clearResult; $("markPostponedBtn").onclick=()=>setFlags(true,false); $("unmarkPostponedBtn").onclick=()=>setFlags(false,false); $("markNoPlayedBtn").onclick=()=>setFlags(false,true); $("unmarkNoPlayedBtn").onclick=()=>setFlags(false,false); $("deleteMatchBtn").onclick=deleteSelectedMatch; $("playerCategory").onchange=renderPlayers; $("roundCategory").onchange=renderRounds; $("matchCategory").onchange=()=>{fillMatchFormOptions();renderMatches();}; $("manageCategory").onchange=fillManageMatches; $("manageMatch").onchange=loadSelectedMatchData; }
wire();
</script>
</body>
</html>
